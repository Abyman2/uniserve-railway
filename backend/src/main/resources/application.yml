spring:
  application:
    name: backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uniconnect_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    out-of-order: true

server:
  # Railway (and most PaaS) injects a PORT environment variable.
  # Binding to it is required for the service to receive traffic.
  port: ${PORT:8080}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-at-least-32-characters-long}
