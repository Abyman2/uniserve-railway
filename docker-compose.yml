services:

  db:
    image: postgres:15
    container_name: uniconnect-db
    restart: always
    environment:
      POSTGRES_DB: uniconnect_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - uniconnect-network

  app:
    build:
      context: ./backend
    container_name: uniconnect-app
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-key-at-least-32-characters-long}
      DB_URL: jdbc:postgresql://db:5432/uniconnect_db
      DB_USER: postgres
      DB_PASS: postgres
    networks:
      - uniconnect-network

networks:
  uniconnect-network:
